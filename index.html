<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eagle Master – Pay with PayHero</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* ---------- SAME BEAUTIFUL STYLES (unchanged) ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle at 10% 30%, #0a1a2f, #0d2847);
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(2px 2px at 20% 30%, rgba(255, 215, 0, 0.15), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255, 215, 0, 0.10), transparent),
                radial-gradient(2px 2px at 80% 20%, rgba(255, 215, 0, 0.12), transparent);
            background-size: 200px 200px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
        }
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 0, 0.05) inset;
            max-width: 500px;
            width: 100%;
            padding: 48px 40px;
            transition: transform 0.3s ease, box-shadow 0.4s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 0, 0.1) inset;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f6b026, #d48b1c);
            border-radius: 50%;
            color: #0a1a2f;
            font-size: 40px;
            margin-bottom: 18px;
            box-shadow: 0 12px 30px rgba(246, 176, 38, 0.3);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .header .logo-icon:hover {
            transform: scale(1.05) rotate(-5deg);
            box-shadow: 0 16px 40px rgba(246, 176, 38, 0.5);
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #f6b026, #f9d976);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(246, 176, 38, 0.2);
        }
        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            font-weight: 400;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-group label i {
            margin-right: 10px;
            color: #f6b026;
            width: 20px;
            text-align: center;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }
        .input-wrapper:focus-within {
            border-color: #f6b026;
            background: rgba(255, 255, 255, 0.10);
            box-shadow: 0 0 0 4px rgba(246, 176, 38, 0.15);
        }
        .input-wrapper .prefix {
            padding: 0 0 0 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            white-space: nowrap;
            background: transparent;
            border: none;
            pointer-events: none;
        }
        .input-wrapper input {
            width: 100%;
            padding: 16px 18px;
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
        }
        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 400;
        }
        .input-wrapper input[type="number"]::-webkit-inner-spin-button,
        .input-wrapper input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .input-wrapper input[type="number"] {
            -moz-appearance: textfield;
        }
        .input-wrapper .currency {
            padding: 0 18px 0 0;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            background: transparent;
            border: none;
            pointer-events: none;
        }

        /* ---------- BUTTON (no widget, just a form submit) ---------- */
        .btn-submit {
            position: relative;
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, #f6b026, #d48b1c);
            color: #0a1a2f;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 12px;
            box-shadow: 0 8px 30px rgba(246, 176, 38, 0.3);
            letter-spacing: 0.5px;
            overflow: hidden;
            z-index: 1;
            font-family: inherit;
        }
        .btn-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
            z-index: 0;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(246, 176, 38, 0.45);
        }
        .btn-submit:hover::before {
            transform: translateX(100%);
        }
        .btn-submit:active {
            transform: translateY(0px);
            box-shadow: 0 4px 20px rgba(246, 176, 38, 0.25);
        }
        .btn-submit .btn-icon,
        .btn-submit .btn-text {
            position: relative;
            z-index: 1;
        }

        .status {
            margin-top: 24px;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
        }
        .status.show { display: flex; }
        .status.success { border-color: #4caf50; color: #b9f6ca; background: rgba(76, 175, 80, 0.15); }
        .status.error { border-color: #ef5350; color: #ffcdd2; background: rgba(239, 83, 80, 0.15); }
        .status.info { border-color: #42a5f5; color: #bbdefb; background: rgba(66, 165, 245, 0.15); }
        .status i { font-size: 18px; flex-shrink: 0; }

        .footer-text {
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
            letter-spacing: 0.3px;
        }
        .footer-text i { margin-right: 6px; color: rgba(255, 255, 255, 0.25); }

        @media (max-width: 520px) {
            .card { padding: 32px 24px; border-radius: 28px; }
            .header h1 { font-size: 26px; }
            .header .logo-icon { width: 64px; height: 64px; font-size: 32px; }
            .input-wrapper input { font-size: 15px; padding: 14px 16px; }
            .btn-submit { font-size: 16px; padding: 16px 20px; }
        }
        @media (max-width: 380px) {
            .card { padding: 24px 16px; border-radius: 24px; }
            .input-wrapper .prefix,
            .input-wrapper .currency { font-size: 13px; }
            .input-wrapper input { font-size: 14px; padding: 12px 14px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="logo-icon">
                <i class="fas fa-dove"></i>
            </div>
            <h1>Eagle Master</h1>
            <p>Secure payments – M‑Pesa, Airtel &amp; Visa/Mastercard</p>
        </div>

        <!-- Direct form: submits to PayHero checkout URL -->
        <form id="paymentForm" method="GET" action="https://payherokenya.com" target="_blank">
            <!-- Hidden channel_id -->
            <input type="hidden" name="channel_id" value="9929" />

            <div class="form-group">
                <label for="phoneInput">
                    <i class="fas fa-phone-alt"></i> Phone Number
                </label>
                <div class="input-wrapper">
                    <span class="prefix">+254</span>
                    <input
                    type="tel"
                    id="phoneInput"
                    name="phone"
                    placeholder="712 345 678"
                    maxlength="15"
                    autocomplete="tel"
                    required
                    />
                </div>
            </div>

            <div class="form-group">
                <label for="amountInput">
                    <i class="fas fa-coins"></i> Amount (KES)
                </label>
                <div class="input-wrapper">
                    <input
                    type="number"
                    id="amountInput"
                    name="amount"
                    placeholder="0.00"
                    min="1"
                    step="0.01"
                    autocomplete="off"
                    required
                    />
                    <span class="currency">KES</span>
                </div>
            </div>

            <div class="form-group">
                <label for="nameInput">
                    <i class="fas fa-user"></i> Full Name (optional)
                </label>
                <div class="input-wrapper">
                    <input
                    type="text"
                    id="nameInput"
                    name="name"
                    placeholder="Jane Doe"
                    autocomplete="name"
                    />
                </div>
            </div>

            <!-- Hidden fields for reference, success/fail URLs -->
            <input type="hidden" name="reference" id="referenceInput" />
            <input type="hidden" name="success_url" value="https://sharpness-payhero-frontend.vercel.app?status=success" />
            <input type="hidden" name="fail_url" value="https://sharpness-payhero-frontend.vercel.app?status=fail" />
            <input type="hidden" name="callback_url" value="https://sharpness-payhero-backend.onrender.com/api/payments/callback" />

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-icon"><i class="fas fa-credit-card"></i></span>
                <span class="btn-text">Pay Securely with Card / M‑Pesa</span>
            </button>
        </form>

        <div class="status" id="statusMessage">
            <i class="fas fa-circle-check"></i>
            <span id="statusText">Success</span>
        </div>

        <p class="footer-text">
            <i class="fas fa-lock"></i> Secured by PayHero &bull; Card &amp; Mobile Money accepted
        </p>
    </div>

    <script>
        (function() {
            'use strict';

            // ---------- Auto-generate reference on form submit ----------
            const form = document.getElementById('paymentForm');
            const referenceInput = document.getElementById('referenceInput');

            form.addEventListener('submit', function(e) {
                // Generate a unique reference before submitting
                const ref = 'EM-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substring(2, 6).toUpperCase();
                referenceInput.value = ref;

                // Optional: log for debugging
                console.log('Submitting to PayHero with reference:', ref);
            });

            // ---------- Handle success/fail redirect parameters ----------
            const urlParams = new URLSearchParams(window.location.search);
            const statusParam = urlParams.get('status');
            const refParam = urlParams.get('reference');
            const statusEl = document.getElementById('statusMessage');
            const statusText = document.getElementById('statusText');

            if (statusParam === 'success' && refParam) {
                statusEl.className = 'status show success';
                statusText.textContent = `✅ Payment successful! Reference: ${refParam}`;
                // Clear query params from URL
                window.history.replaceState({}, document.title, window.location.pathname);
            } else if (statusParam === 'fail') {
                statusEl.className = 'status show error';
                statusText.textContent = '❌ Payment failed or cancelled. Please try again.';
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // ---------- Input validation and sanitization ----------
            const phoneInput = document.getElementById('phoneInput');
            const amountInput = document.getElementById('amountInput');

            phoneInput.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').slice(0, 15);
            });

            amountInput.addEventListener('input', function() {
                let val = this.value.replace(/[^0-9.]/g, '');
                const parts = val.split('.');
                if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
                if (val.startsWith('0') && !val.startsWith('0.')) val = val.replace(/^0+/, '');
                this.value = val;
            });

            // Show a friendly info message if the page loads without redirect
            if (!statusParam) {
                // Remove any existing status classes
                statusEl.className = 'status show info';
                statusText.textContent = 'Fill in the details and click "Pay Securely" to proceed.';
            }
        })();
    </script>

</body>
</html>

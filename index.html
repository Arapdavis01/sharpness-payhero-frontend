<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eagle Master – Pay with PayHero</title>

    <!-- Google Fonts for elegant typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- PayHero Widget SDK -->
    <script src="https://payhero.co.ke"></script>

    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle at 10% 30%, #0a1a2f, #0d2847);
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(2px 2px at 20% 30%, rgba(255, 215, 0, 0.15), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255, 215, 0, 0.10), transparent),
                radial-gradient(2px 2px at 80% 20%, rgba(255, 215, 0, 0.12), transparent);
            background-size: 200px 200px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
        }

        /* ---------- CARD (Glass-morphism) ---------- */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 0, 0.05) inset;
            max-width: 500px;
            width: 100%;
            padding: 48px 40px;
            transition: transform 0.3s ease, box-shadow 0.4s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 0, 0.1) inset;
        }

        /* ---------- HEADER ---------- */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f6b026, #d48b1c);
            border-radius: 50%;
            color: #0a1a2f;
            font-size: 40px;
            margin-bottom: 18px;
            box-shadow: 0 12px 30px rgba(246, 176, 38, 0.3);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .header .logo-icon:hover {
            transform: scale(1.05) rotate(-5deg);
            box-shadow: 0 16px 40px rgba(246, 176, 38, 0.5);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #f6b026, #f9d976);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(246, 176, 38, 0.2);
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            font-weight: 400;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        /* ---------- FORM ---------- */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .form-group label i {
            margin-right: 10px;
            color: #f6b026;
            width: 20px;
            text-align: center;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: #f6b026;
            background: rgba(255, 255, 255, 0.10);
            box-shadow: 0 0 0 4px rgba(246, 176, 38, 0.15);
        }

        .input-wrapper .prefix {
            padding: 0 0 0 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            white-space: nowrap;
            background: transparent;
            border: none;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 18px;
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 400;
        }

        .input-wrapper input[type="number"]::-webkit-inner-spin-button,
        .input-wrapper input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-wrapper input[type="number"] {
            -moz-appearance: textfield;
        }

        .input-wrapper .currency {
            padding: 0 18px 0 0;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            background: transparent;
            border: none;
            pointer-events: none;
        }

        /* ---------- PAYHERO BUTTON (styled to match our theme) ---------- */
        #payhero-button-container {
            margin-top: 12px;
            width: 100%;
        }

        /* Override PayHero’s default button styles */
        #payhero-button-container .payhero-button {
            width: 100% !important;
            border-radius: 16px !important;
            font-family: 'Inter', sans-serif !important;
            font-weight: 700 !important;
            font-size: 18px !important;
            padding: 18px 24px !important;
            background: linear-gradient(135deg, #f6b026, #d48b1c) !important;
            color: #0a1a2f !important;
            border: none !important;
            box-shadow: 0 8px 30px rgba(246, 176, 38, 0.3) !important;
            transition: all 0.3s ease !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 14px !important;
            letter-spacing: 0.5px !important;
            cursor: pointer !important;
            position: relative;
            overflow: hidden;
        }

        #payhero-button-container .payhero-button::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
            z-index: 0;
        }

        #payhero-button-container .payhero-button:hover::before {
            transform: translateX(100%);
        }

        #payhero-button-container .payhero-button:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 12px 40px rgba(246, 176, 38, 0.45) !important;
        }

        #payhero-button-container .payhero-button:active {
            transform: translateY(0px) !important;
            box-shadow: 0 4px 20px rgba(246, 176, 38, 0.25) !important;
        }

        #payhero-button-container .payhero-button .payhero-button-text {
            position: relative;
            z-index: 1;
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
        }

        /* ---------- STATUS ---------- */
        .status {
            margin-top: 24px;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
        }

        .status.show {
            display: flex;
        }

        .status.success {
            border-color: #4caf50;
            color: #b9f6ca;
            background: rgba(76, 175, 80, 0.15);
        }

        .status.error {
            border-color: #ef5350;
            color: #ffcdd2;
            background: rgba(239, 83, 80, 0.15);
        }

        .status.info {
            border-color: #42a5f5;
            color: #bbdefb;
            background: rgba(66, 165, 245, 0.15);
        }

        .status i {
            font-size: 18px;
            flex-shrink: 0;
        }

        /* ---------- FOOTER ---------- */
        .footer-text {
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
            letter-spacing: 0.3px;
        }
        .footer-text i {
            margin-right: 6px;
            color: rgba(255, 255, 255, 0.25);
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 520px) {
            .card {
                padding: 32px 24px;
                border-radius: 28px;
            }
            .header h1 {
                font-size: 26px;
            }
            .header .logo-icon {
                width: 64px;
                height: 64px;
                font-size: 32px;
            }
            .input-wrapper input {
                font-size: 15px;
                padding: 14px 16px;
            }
            #payhero-button-container .payhero-button {
                font-size: 16px !important;
                padding: 16px 20px !important;
            }
        }

        @media (max-width: 380px) {
            .card {
                padding: 24px 16px;
                border-radius: 24px;
            }
            .input-wrapper .prefix,
            .input-wrapper .currency {
                font-size: 13px;
            }
            .input-wrapper input {
                font-size: 14px;
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="logo-icon">
                <i class="fas fa-dove"></i>
            </div>
            <h1>Eagle Master</h1>
            <p>Secure payments – M‑Pesa, Airtel &amp; Visa/Mastercard</p>
        </div>

        <form id="paymentForm" novalidate>
            <!-- Phone (required for M‑Pesa/Airtel) -->
            <div class="form-group">
                <label for="phoneInput">
                    <i class="fas fa-phone-alt"></i> Phone Number
                </label>
                <div class="input-wrapper">
                    <span class="prefix">+254</span>
                    <input
                    type="tel"
                    id="phoneInput"
                    placeholder="712 345 678"
                    maxlength="15"
                    autocomplete="tel"
                    required
                    />
                </div>
            </div>

            <!-- Amount -->
            <div class="form-group">
                <label for="amountInput">
                    <i class="fas fa-coins"></i> Amount (KES)
                </label>
                <div class="input-wrapper">
                    <input
                    type="number"
                    id="amountInput"
                    placeholder="0.00"
                    min="1"
                    step="0.01"
                    autocomplete="off"
                    required
                    />
                    <span class="currency">KES</span>
                </div>
            </div>

            <!-- Customer Name (optional) -->
            <div class="form-group">
                <label for="nameInput">
                    <i class="fas fa-user"></i> Full Name (optional)
                </label>
                <div class="input-wrapper">
                    <input
                    type="text"
                    id="nameInput"
                    placeholder="Jane Doe"
                    autocomplete="name"
                    />
                </div>
            </div>

            <!-- PayHero Button Container (rendered dynamically) -->
            <div id="payhero-button-container"></div>
        </form>

        <div class="status" id="statusMessage">
            <i class="fas fa-circle-check"></i>
            <span id="statusText">Success</span>
        </div>

        <p class="footer-text">
            <i class="fas fa-lock"></i> Secured by PayHero &bull; Card &amp; Mobile Money accepted
        </p>
    </div>

    <script>
        (function() {
            'use strict';

            // ---------- CONFIGURATION (updated with your credentials) ----------
            const CHANNEL_ID = '9929';   // Your actual PayHero channel ID
            const CALLBACK_URL = 'https://sharpness-payhero-backend.onrender.com/api/payments/callback';
            const SUCCESS_URL = window.location.origin + window.location.pathname + '?status=success';
            const FAIL_URL = window.location.origin + window.location.pathname + '?status=fail';

            // DOM refs
            const form = document.getElementById('paymentForm');
            const phoneInput = document.getElementById('phoneInput');
            const amountInput = document.getElementById('amountInput');
            const nameInput = document.getElementById('nameInput');
            const statusEl = document.getElementById('statusMessage');
            const statusText = document.getElementById('statusText');
            const buttonContainer = document.getElementById('payhero-button-container');

            // ---------- Helpers ----------
            function showStatus(message, type) {
                statusEl.className = 'status show ' + type;
                statusText.textContent = message;
                const icon = statusEl.querySelector('i');
                const icons = {
                    success: 'fa-circle-check',
                    error: 'fa-circle-exclamation',
                    info: 'fa-circle-info'
                };
                icon.className = 'fas ' + (icons[type] || 'fa-circle-info');
            }

            function hideStatus() {
                statusEl.className = 'status';
            }

            function formatPhone(raw) {
                const cleaned = raw.replace(/\D/g, '');
                let normalized = cleaned.startsWith('254') ? cleaned : '254' + cleaned;
                return normalized;
            }

            function generateReference() {
                return 'EM-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substring(2, 6).toUpperCase();
            }

            // ---------- Render PayHero Button ----------
            function renderPayHeroButton(amount, phone, name) {
                // Clear previous button
                buttonContainer.innerHTML = '';

                if (typeof PayHero === 'undefined') {
                    showStatus('PayHero SDK failed to load. Please refresh.', 'error');
                    return;
                }

                const formattedPhone = formatPhone(phone);
                const reference = generateReference();

                const config = {
                    channel_id: CHANNEL_ID,
                    amount: parseFloat(amount).toFixed(2),
                    reference: reference,
                    customer_name: name || 'Customer',
                    customer_phone: formattedPhone,
                    callback_url: CALLBACK_URL,
                    success_url: SUCCESS_URL,
                    fail_url: FAIL_URL,
                    // Custom styling
                    button_text: 'Pay Securely with Card / M‑Pesa',
                    button_color: '#f6b026',
                    button_text_color: '#0a1a2f',
                };

                try {
                    PayHero.Button(config).render('#payhero-button-container');

                    // Inject a custom icon into the button text after render
                    const btn = document.querySelector('#payhero-button-container .payhero-button .payhero-button-text');
                    if (btn) {
                        btn.innerHTML = '<i class="fas fa-credit-card" style="margin-right:10px;"></i> ' + btn.textContent;
                    }

                    hideStatus();
                    showStatus('Click the button below to proceed to secure checkout.', 'info');
                } catch (error) {
                    console.error('PayHero Button error:', error);
                    showStatus('Failed to initialize payment button. Check console.', 'error');
                }
            }

            // ---------- Form submission ----------
            async function handleSubmit(e) {
                e.preventDefault();
                hideStatus();

                const rawAmount = amountInput.value.trim();
                const rawPhone = phoneInput.value.trim();
                const name = nameInput.value.trim() || 'Customer';

                // Validate
                const amountNum = parseFloat(rawAmount);
                if (isNaN(amountNum) || amountNum <= 0) {
                    showStatus('Please enter a valid amount greater than 0.', 'error');
                    amountInput.focus();
                    return;
                }
                const phoneDigits = rawPhone.replace(/\D/g, '');
                if (phoneDigits.length < 9 || phoneDigits.length > 12) {
                    showStatus('Please enter a valid Safaricom phone number (e.g., 712345678).', 'error');
                    phoneInput.focus();
                    return;
                }

                // Render the PayHero button with the provided details
                renderPayHeroButton(rawAmount, rawPhone, name);
            }

            // ---------- Event listeners ----------
            form.addEventListener('submit', handleSubmit);

            // Auto-focus amount
            amountInput.focus();

            // ---------- Check for success/fail redirect parameters ----------
            const urlParams = new URLSearchParams(window.location.search);
            const statusParam = urlParams.get('status');
            const refParam = urlParams.get('reference');

            if (statusParam === 'success' && refParam) {
                showStatus(`✅ Payment successful! Reference: ${refParam}`, 'success');
                // Optionally clear form
                amountInput.value = '';
                phoneInput.value = '';
                nameInput.value = '';
                // Remove the query parameters from URL without reload
                window.history.replaceState({}, document.title, window.location.pathname);
            } else if (statusParam === 'fail') {
                showStatus('❌ Payment failed or cancelled. Please try again.', 'error');
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // ---------- Input sanitization ----------
            amountInput.addEventListener('input', function() {
                let val = this.value.replace(/[^0-9.]/g, '');
                const parts = val.split('.');
                if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
                if (val.startsWith('0') && !val.startsWith('0.')) val = val.replace(/^0+/, '');
                this.value = val;
            });

            phoneInput.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').slice(0, 15);
            });

            // Show a hint if no button yet
            if (!buttonContainer.children.length) {
                showStatus('Enter amount and phone, then submit to continue.', 'info');
            }
        })();
    </script>

</body>
</html>
